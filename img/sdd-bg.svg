<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1142"/>
      <stop offset="0.55" stop-color="#160d33"/>
      <stop offset="1" stop-color="#100826"/>
    </linearGradient>
    <radialGradient id="glow-a" cx="0.72" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#9d7cf5" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#9d7cf5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-b" cx="0.85" cy="0.85" r="0.55">
      <stop offset="0" stop-color="#5e3fb8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#5e3fb8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0 H0 V64" fill="none" stroke="#9d7cf5" stroke-width="1" opacity="0.06"/>
    </pattern>
    <linearGradient id="left-shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#100826" stop-opacity="0.82"/>
      <stop offset="0.45" stop-color="#100826" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#100826" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1920" height="1080" fill="url(#bg-base)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#glow-a)"/>
  <rect width="1920" height="1080" fill="url(#glow-b)"/>

  <!-- ===== SDD pipeline: proposal -> spec -> design -> tasks -> build ===== -->
  <g opacity="0.85">
    <!-- connecting flow -->
    <path d="M360 800 C 520 700, 600 700, 700 660 S 880 720, 1000 700 S 1180 600, 1290 620 S 1500 700, 1610 660"
          fill="none" stroke="#9d7cf5" stroke-width="2.5" stroke-dasharray="2 12" stroke-linecap="round" opacity="0.55"/>

    <!-- node 1: Proposal (document) -->
    <g transform="translate(360,800)">
      <circle r="52" fill="#1a1038" stroke="#9d7cf5" stroke-width="2.5" opacity="0.9"/>
      <rect x="-22" y="-28" width="44" height="56" rx="6" fill="none" stroke="#b8a3ff" stroke-width="3"/>
      <line x1="-13" y1="-12" x2="13" y2="-12" stroke="#b8a3ff" stroke-width="3" stroke-linecap="round"/>
      <line x1="-13" y1="0" x2="13" y2="0" stroke="#7d72ad" stroke-width="3" stroke-linecap="round"/>
      <line x1="-13" y1="12" x2="4" y2="12" stroke="#7d72ad" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- node 2: Spec (document + check) -->
    <g transform="translate(700,660)">
      <circle r="52" fill="#1a1038" stroke="#9d7cf5" stroke-width="2.5" opacity="0.9"/>
      <rect x="-24" y="-28" width="40" height="56" rx="6" fill="none" stroke="#b8a3ff" stroke-width="3"/>
      <line x1="-16" y1="-14" x2="8" y2="-14" stroke="#7d72ad" stroke-width="3" stroke-linecap="round"/>
      <line x1="-16" y1="-2" x2="8" y2="-2" stroke="#7d72ad" stroke-width="3" stroke-linecap="round"/>
      <path d="M2 14 l8 9 l18 -22" fill="none" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- node 3: Design (blueprint geometry) -->
    <g transform="translate(1000,700)">
      <circle r="52" fill="#1a1038" stroke="#9d7cf5" stroke-width="2.5" opacity="0.9"/>
      <circle r="26" fill="none" stroke="#b8a3ff" stroke-width="3"/>
      <path d="M0 -26 L23 14 L-23 14 Z" fill="none" stroke="#9d7cf5" stroke-width="2.5"/>
      <circle r="4" fill="#6ee7b7"/>
    </g>

    <!-- node 4: Tasks (checklist) -->
    <g transform="translate(1290,620)">
      <circle r="52" fill="#1a1038" stroke="#9d7cf5" stroke-width="2.5" opacity="0.9"/>
      <g transform="translate(-26,-22)">
        <rect x="0" y="0" width="16" height="16" rx="4" fill="none" stroke="#6ee7b7" stroke-width="2.5"/>
        <path d="M3 8 l4 4 l7 -8" fill="none" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="24" y1="8" x2="50" y2="8" stroke="#7d72ad" stroke-width="3" stroke-linecap="round"/>
        <rect x="0" y="28" width="16" height="16" rx="4" fill="none" stroke="#9d7cf5" stroke-width="2.5"/>
        <line x1="24" y1="36" x2="44" y2="36" stroke="#7d72ad" stroke-width="3" stroke-linecap="round"/>
      </g>
    </g>

    <!-- node 5: Build (gear) -->
    <g transform="translate(1610,660)">
      <circle r="52" fill="#1a1038" stroke="#6ee7b7" stroke-width="2.5" opacity="0.9"/>
      <g fill="#b8a3ff">
        <rect x="-7" y="-34" width="14" height="18" rx="3" transform="rotate(0)"/>
        <rect x="-7" y="-34" width="14" height="18" rx="3" transform="rotate(60)"/>
        <rect x="-7" y="-34" width="14" height="18" rx="3" transform="rotate(120)"/>
        <rect x="-7" y="-34" width="14" height="18" rx="3" transform="rotate(180)"/>
        <rect x="-7" y="-34" width="14" height="18" rx="3" transform="rotate(240)"/>
        <rect x="-7" y="-34" width="14" height="18" rx="3" transform="rotate(300)"/>
      </g>
      <circle r="24" fill="#1a1038" stroke="#b8a3ff" stroke-width="3"/>
      <path d="M-7 -9 L9 0 L-7 9 Z" fill="#6ee7b7"/>
    </g>
  </g>

  <!-- ===== scattered spec motifs ===== -->
  <g font-family="'JetBrains Mono','Courier New',monospace" opacity="0.5">
    <text x="1500" y="240" font-size="40" fill="#9d7cf5" opacity="0.5">&lt;/&gt;</text>
    <text x="1180" y="930" font-size="34" fill="#9d7cf5" opacity="0.4">{ }</text>
    <text x="820" y="300" font-size="30" fill="#b8a3ff" opacity="0.4">## spec</text>
    <text x="430" y="470" font-size="28" fill="#7d72ad" opacity="0.5">- [x]</text>
    <text x="1690" y="900" font-size="28" fill="#6ee7b7" opacity="0.45">- [x]</text>
    <text x="1360" y="340" font-size="26" fill="#7d72ad" opacity="0.45">- [ ]</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.55">
    <path d="M1640 300 l10 11 l20 -24" stroke="#6ee7b7" stroke-width="4"/>
    <path d="M560 940 l9 10 l18 -22" stroke="#6ee7b7" stroke-width="4" opacity="0.7"/>
    <path d="M1080 200 l9 10 l18 -22" stroke="#6ee7b7" stroke-width="3.5" opacity="0.6"/>
  </g>
  <g fill="#9d7cf5">
    <circle cx="240" cy="640" r="3" opacity="0.5"/>
    <circle cx="900" cy="900" r="3" opacity="0.45"/>
    <circle cx="1760" cy="480" r="3" opacity="0.5"/>
    <circle cx="1300" cy="880" r="3" opacity="0.4"/>
    <circle cx="700" cy="200" r="3" opacity="0.4"/>
  </g>

  <!-- left legibility shade -->
  <rect width="1920" height="1080" fill="url(#left-shade)"/>
</svg>
