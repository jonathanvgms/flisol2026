  <!-- Plan box -->
  <rect x="24" y="106" width="760" height="172" rx="8" fill="rgba(43,25,95,0.45)" stroke="rgba(157,124,245,0.22)" stroke-width="1"/>
  <text x="44" y="130" font-family="'Courier New', monospace" font-size="12" font-weight="700" fill="#b8a3ff">Plan de cambios:</text>
