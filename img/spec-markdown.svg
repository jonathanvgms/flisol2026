<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="md-doc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1140"/>
      <stop offset="1" stop-color="#150c30"/>
    </linearGradient>
    <filter id="md-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#9d7cf5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Markdown document -->
  <g filter="url(#md-glow)">
    <rect x="118" y="40" width="164" height="150" rx="16" fill="url(#md-doc)" stroke="#9d7cf5" stroke-width="2"/>
  </g>

  <!-- Markdown mark badge -->
  <g transform="translate(150,70)">
    <rect x="0" y="0" width="100" height="64" rx="12" fill="none" stroke="#b8a3ff" stroke-width="4"/>
    <!-- M -->
    <path d="M14 48 L14 16 L26 16 L38 32 L50 16 L62 16 L62 48 L50 48 L50 33 L38 47 L26 33 L26 48 Z" fill="#b8a3ff"/>
    <!-- down arrow -->
    <path d="M78 16 L78 36 M70 30 L78 40 L86 30" fill="none" stroke="#6ee7b7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- text lines -->
  <rect x="140" y="150" width="120" height="6" rx="3" fill="#6a5da0"/>
  <rect x="140" y="166" width="84" height="6" rx="3" fill="#4a4076"/>

  <!-- Git branch graph (versioned) -->
  <g stroke="#9d7cf5" stroke-width="4" fill="none">
    <path d="M70 220 L70 270"/>
    <path d="M70 245 C70 228, 200 228, 200 212"/>
    <path d="M70 245 C70 262, 330 262, 330 246"/>
  </g>
  <circle cx="70" cy="220" r="11" fill="#150c30" stroke="#9d7cf5" stroke-width="4"/>
  <circle cx="70" cy="270" r="11" fill="#150c30" stroke="#9d7cf5" stroke-width="4"/>
  <circle cx="200" cy="210" r="13" fill="#1c1140" stroke="#b8a3ff" stroke-width="4"/>
  <circle cx="330" cy="246" r="11" fill="#150c30" stroke="#6ee7b7" stroke-width="4"/>
  <path d="M325 246 l4 5 l7 -9" stroke="#6ee7b7" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
